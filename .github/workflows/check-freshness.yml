name: Check Freshness

on:
  schedule:
    - cron: "0 8 * * *"  # Daily 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Check freshness
        id: freshness
        run: |
          result=$(npm run freshness:check --silent 2>&1 || true)
          echo "$result"
          if echo "$result" | grep -q '"status":"stale"'; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if stale
        if: steps.freshness.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'data-freshness',
              state: 'open',
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Data freshness: ingestion overdue',
                body: 'The `check_data_freshness` tool reports stale data (>90 days since last ingest).\n\nRun `gh workflow run ingest.yml` to refresh.',
                labels: ['data-freshness'],
              });
            }
